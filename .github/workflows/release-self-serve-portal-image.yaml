name: Release Self Serve Portal Image - Publish
on:
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        description: The type of release
        options:
          - Major
          - Minor
          - Patch
          - Snapshot
        required: true

jobs:
  incrementVersionNumber:
    uses: IABTechLab/uid2-shared-actions/.github/workflows/shared-increase-version-number.yaml@v3
    with:
      release_type: ${{ inputs.release_type }}
      merge_environment: ${{ github.ref_protected && 'ci-auto-merge' || '' }}
    secrets: inherit

  buildApi:
    runs-on: ubuntu-latest
    needs: incrementVersionNumber
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        run: npm ci

      - name: Patch version in package.json
        run: |
          jq '.version = "${{ needs.incrementVersionNumber.outputs.new_version }}"' package.json > tmp.json
          mv tmp.json package.json

      - name: Build API
        run: npm run build-api

      - name: Upload built API files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-dist
          path: api-dist/

      - name: Upload patched package.json
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: patched-package
          path: package.json

  publishForApiUi:
    name: Build & Publish API/UI Image
    runs-on: ubuntu-latest
    needs: [incrementVersionNumber, buildApi]
    permissions:
      contents: write
      packages: write
      security-events: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download built API files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-dist
          path: api-dist/

      - name: Download patched package.json
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: patched-package
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image for API/UI
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile_ssportal
          push: true
          tags: ghcr.io/iabtechlab/uid2-ssportal:${{ needs.incrementVersionNumber.outputs.image_tag }}
      - name: Vulnerability scan
        uses: IABTechLab/uid2-shared-actions/actions/vulnerability_scan@v3
        with:
          publish_vulnerabilities: true
          failure_severity: CRITICAL
          scan_severity: CRITICAL,HIGH
          image_ref: ghcr.io/iabtechlab/uid2-ssportal:${{ needs.incrementVersionNumber.outputs.image_tag }}
          scan_type: image

  publishForDBMigration:
    uses: IABTechLab/uid2-shared-actions/.github/workflows/shared-publish-to-docker-versioned.yaml@v3
    needs: incrementVersionNumber
    with:
      new_version: ${{ needs.incrementVersionNumber.outputs.new_version }}
      image_tag: ${{ needs.incrementVersionNumber.outputs.image_tag }}
      git_tag_or_hash: ${{ needs.incrementVersionNumber.outputs.git_tag_or_hash }}
      release_type: ${{ inputs.release_type }}
      docker_file: Dockerfile_ssportal_migration
      docker_image_name: iabtechlab/uid2-ssportal-migration
      docker_registry: ghcr.io
      vulnerability_severity: CRITICAL
      vulnerability_exception_ticket: https://thetradedesk.atlassian.net/browse/UID2-7422
    secrets: inherit

  publishForKeycloak:
    uses: IABTechLab/uid2-shared-actions/.github/workflows/shared-publish-to-docker-versioned.yaml@v3
    needs: incrementVersionNumber
    with:
      new_version: ${{ needs.incrementVersionNumber.outputs.new_version }}
      image_tag: ${{ needs.incrementVersionNumber.outputs.image_tag }}
      git_tag_or_hash: ${{ needs.incrementVersionNumber.outputs.git_tag_or_hash }}
      release_type: ${{ inputs.release_type }}
      docker_file: Dockerfile_keycloak
      docker_image_name: iabtechlab/uid2-ssportal-keycloak
      docker_registry: ghcr.io
    secrets: inherit
